name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  USE_IN_MEMORY_STORE: "1"
  USE_LOCAL_BM25: "1"
  USE_HASHING_EMBEDDER: "1"
  USE_LOCAL_ICD10: "1"
  USE_LOCAL_DRUG_CHECK: "1"
  USE_FALLBACK_CODING_CREW: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff black
      - run: ruff check .
      - run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-full.txt
      - run: pytest -v

  eval:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-full.txt
      - run: python eval/run_ragas_eval.py

  build-image:
    runs-on: ubuntu-latest
    needs: eval
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t clinicalrag-api:${{ github.sha }} .
